<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asisten Kamu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #1C1B29;
    color: #F5F0E6;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #3A3752; border-radius: 4px; }

  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid #2A2840;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #E3B23C, #4FD1C5);
  }
  .title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; }
  .status { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #8B87A6; margin-top: 2px; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    font-size: 14.5px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.user { background: #E3B23C; color: #1C1B29; border-radius: 18px 18px 4px 18px; }
  .bubble.assistant { background: #26243A; border: 1px solid #322F49; border-radius: 18px 18px 18px 4px; }

  .dots { display: flex; gap: 5px; padding: 12px 16px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4FD1C5; animation: breathe 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes breathe { 0%,100% { opacity:.3; transform:scale(.8);} 50%{opacity:1; transform:scale(1.1);} }

  #inputBar {
    padding: 12px 14px 16px;
    border-top: 1px solid #2A2840;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    resize: none;
    background: #26243A;
    border: 1px solid #3A3752;
    border-radius: 14px;
    padding: 10px 14px;
    color: #F5F0E6;
    font-size: 14.5px;
    font-family: 'Inter', sans-serif;
    outline: none;
    max-height: 120px;
  }
  textarea::placeholder { color: #6B6885; }
  button {
    background: #3A3752;
    color: #6B6885;
    border: none;
    border-radius: 12px;
    width: 42px; height: 42px;
    flex-shrink: 0;
    font-size: 16px;
    cursor: default;
  }
  button.active { background: #E3B23C; color: #1C1B29; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="avatar"></div>
  <div>
    <div class="title">Asisten Kamu</div>
    <div class="status" id="status">siap membantu</div>
  </div>
</header>

<div id="messages"></div>

<div id="inputBar">
  <textarea id="input" rows="1" placeholder="Tulis pesan..."></textarea>
  <button id="sendBtn">↑</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const statusEl = document.getElementById('status');

  let history = [
    { role: 'assistant', content: 'Halo! Aku asisten AI kamu. Tanya apa saja.' }
  ];
  let loading = false;

  function render() {
    messagesEl.innerHTML = '';
    history.forEach(m => {
      const row = document.createElement('div');
      row.className = 'row ' + m.role;
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + m.role;
      bubble.textContent = m.content;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
    });
    if (loading) {
      const row = document.createElement('div');
      row.className = 'row assistant';
      row.innerHTML = '<div class="bubble assistant"><div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
      messagesEl.appendChild(row);
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function updateButton() {
    const has = inputEl.value.trim().length > 0;
    sendBtn.className = (has && !loading) ? 'active' : '';
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || loading) return;

    history.push({ role: 'user', content: text });
    inputEl.value = '';
    loading = true;
    statusEl.textContent = 'sedang mengetik...';
    updateButton();
    render();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      const reply = (data.content && data.content.find(c => c.type === 'text')?.text)
        || 'Maaf, aku tidak bisa menjawab sekarang.';
      history.push({ role: 'assistant', content: reply });
    } catch (e) {
      history.push({ role: 'assistant', content: 'Ups, ada gangguan koneksi. Coba kirim lagi ya.' });
    } finally {
      loading = false;
      statusEl.textContent = 'siap membantu';
      render();
      updateButton();
    }
  }

  inputEl.addEventListener('input', updateButton);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', send);

  render();
</script>
</body>
</html>
