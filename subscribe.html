<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZO AI — Subscribe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000; --surface:#0d0d0f; --line:rgba(255,255,255,0.09);
    --text:#ffffff; --muted:#96959b; --red:#e3242b; --warn:#e9a13c;
    --font-body:'Inter', sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:var(--font-body); line-height:1.5; padding-bottom:40px;}
  .wrap{max-width:420px; margin:0 auto; padding:0 22px;}
  a{color:inherit;}
  header{padding:22px; text-align:center;}
  .brand{display:inline-flex; align-items:center; gap:8px;}
  .zmark{width:20px; height:20px;}
  .logo{font-weight:800; font-size:16px;}
  .logo .red{color:var(--red);}

  .hero{padding:22px 0 30px; text-align:center;}
  .eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--red); margin-bottom:12px; font-weight:600;}
  h1{font-weight:800; font-size:27px; letter-spacing:-0.02em;}

  .price-card{background:var(--surface); border:1px solid var(--line); border-radius:26px; padding:34px 24px; text-align:center; margin-bottom:26px;}
  .amount{font-weight:800; font-size:46px; letter-spacing:-0.02em;}
  .amount span{font-size:14px; color:var(--muted); font-weight:500;}

  .method-label{font-family:var(--font-mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin:24px 0 10px; text-align:left; font-weight:600;}
  .methods{display:flex; gap:8px; flex-wrap:wrap;}
  .method{border:1px solid var(--line); border-radius:100px; padding:11px 14px; font-family:var(--font-mono); font-size:12.5px; color:var(--text); flex:1; text-align:center; min-width:70px;}
  .method.active{background:#fff; color:#000; border-color:#fff;}

  .pay-btn{width:100%; background:var(--red); color:#fff; border:none; padding:17px; border-radius:100px; font-weight:700; font-size:15px; margin-top:22px;}

  .flow{margin-top:36px;}
  .flow h2{font-size:14px; font-weight:700; margin-bottom:18px; color:var(--muted);}
  .step{display:flex; gap:13px; padding:9px 0;}
  .step-num{font-family:var(--font-mono); font-size:11px; width:24px; height:24px; border-radius:50%; background:var(--surface); border:1px solid var(--line); color:var(--red); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:600;}
  .step-text{font-size:13.5px; color:var(--muted); padding-top:3px;}

  .status-note{font-family:var(--font-mono); font-size:11.5px; color:var(--warn); text-align:center; margin-top:26px; padding:14px; border:1px dashed var(--line); border-radius:14px;}
</style>
</head>
<body>
