<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZO AI — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000; --surface:#0d0d0d; --line:rgba(255,255,255,0.09);
    --text:#ffffff; --muted:#96959b; --red:#e3242b;
    --font-body:'Inter', sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:var(--font-body); height:100vh; display:flex; flex-direction:column;}

  header{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:center; gap:8px;}
  .zmark{width:18px; height:18px; object-fit:contain;}
  .logo{font-weight:800; font-size:16px;}
  .logo .red{color:var(--red);}
  .tier-badge{font-family:var(--font-mono); font-size:10.5px; padding:5px 10px; border-radius:100px; border:1px solid var(--line);}
  .tier-badge.paid{color:var(--red); border-color:var(--red);}
  .header-right{display:flex; align-items:center; gap:8px;}
  .logout-btn{font-family:var(--font-mono); font-size:10.5px; color:var(--muted); background:transparent; border:1px solid var(--line); border-radius:100px; padding:5px 10px;}

  .code-bar{padding:10px 16px; border-bottom:1px solid var(--line); display:none; gap:8px;}
  .code-bar.show{display:flex;}
  .code-bar input{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:9px 12px; font-size:12.5px; color:var(--text);}
  .code-bar button{background:var(--red); color:#fff; border:none; border-radius:12px; padding:9px 14px; font-size:12.5px;}

  .quota{font-family:var(--font-mono); font-size:11px; color:var(--muted); text-align:center; padding:6px 0; border-bottom:1px solid var(--line);}

  .messages{flex:1; overflow-y:auto; padding:20px 18px; display:flex; flex-direction:column; gap:16px;}
  .msg{max-width:82%; padding:14px 17px; border-radius:20px; font-size:14.5px; line-height:1.5; white-space:pre-wrap; word-break:break-word;}
  .msg.user{align-self:flex-end; background:var(--red); color:#fff; font-weight:500; border-bottom-right-radius:6px;}
  .msg.ai{align-self:flex-start; background:var(--surface); border:1px solid var(--line); border-bottom-left-radius:6px;}
  .msg.ai .label{display:block; font-family:var(--font-mono); font-size:10.5px; color:var(--red); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;}

  .composer{border-top:1px solid var(--line); padding:14px 16px 22px; display:flex; gap:10px; align-items:flex-end;}
  .composer textarea{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:14px 16px; font-size:14.5px; color:var(--text); font-family:var(--font-body); resize:none; max-height:120px;}
  .composer textarea:focus{outline:none; border-color:var(--red);}
  .send-btn{background:var(--red); color:#fff; border:none; border-radius:50%; width:46px; height:46px; font-size:18px; flex-shrink:0;}
  .send-btn:disabled{opacity:0.5;}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ---- Require login before this page is usable ----
  const sb = supabase.createClient(
    'https://pjrkzujhrngllagxawxv.supabase.co',
    'sb_publishable_qTeyK93yFVIfzGiycOKP4w_EOKcJAyp'
  );
  let userEmail = '';
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = 'index.html';
      return;
    }
    userEmail = session.user.email;
  })();
</script>

<header>
  <div class="brand">
    <img src="assets/logo2-96.png" class="zmark" alt="ZO AI">
    <div class="logo">ZO <span class="red">AI</span></div>
  </div>
  <div class="header-right">
    <div class="tier-badge" id="tierBadge">Free · GPT</div>
    <button class="logout-btn" id="logoutBtn">Log out</button>
  </div>
</header>

<div class="quota" id="quotaBar">Checking your plan...</div>

<div class="messages" id="messages">
  <div class="msg ai"><span class="label">ZO AI</span>Hey! I can help with writing, research, planning — anything, really. Ask me something.</div>
</div>

<div class="composer">
  <textarea id="input" rows="1" placeholder="Message ZO AI..."></textarea>
  <button class="send-btn" id="sendBtn">➤</button>
</div>

<script>
  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const tierBadge = document.getElementById('tierBadge');
  const quotaBar = document.getElementById('quotaBar');
  const logoutBtn = document.getElementById('logoutBtn');

  logoutBtn.addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });

  let history = [];

  function updateBadge(tier){
    if (tier === 'paid') {
      tierBadge.textContent = 'Pro · Claude';
      tierBadge.classList.add('paid');
    } else {
      tierBadge.textContent = 'Free · GPT';
      tierBadge.classList.remove('paid');
    }
  }

  function addMessage(text, who){
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    if (who === 'ai') {
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = 'ZO AI';
      div.appendChild(label);
      div.appendChild(document.createTextNode(text));
    } else {
      div.textContent = text;
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  async function send(){
    const val = input.value.trim();
    if(!val) return;
    addMessage(val, 'user');
    history.push({ role: 'user', content: val });
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const loadingDiv = addMessage('Thinking...', 'ai');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, email: userEmail || undefined })
      });
      const data = await res.json();
      loadingDiv.remove();

      if (data.error) {
        addMessage('Error: ' + data.error, 'ai');
      } else {
        addMessage(data.reply, 'ai');
        history.push({ role: 'assistant', content: data.reply });
        updateBadge(data.tier);
        if (typeof data.remaining === 'number') {
          const label = data.tier === 'paid' ? 'Pro questions' : 'free questions';
          quotaBar.textContent = data.remaining + ' ' + label + ' left today';
        }
      }
    } catch (err) {
      loadingDiv.remove();
      addMessage('Network error — please try again.', 'ai');
    }

    sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
