<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZO AI — Chat</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000; --surface:#0d0d0d; --line:rgba(255,255,255,0.09);
    --text:#ffffff; --muted:#96959b; --red:#e3242b;
    --font-body:'Inter', sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:var(--font-body); height:100vh; display:flex; flex-direction:column;}

  header{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:center; gap:8px; background:none; border:none; padding:0; cursor:pointer;}
  .avatar-circle{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:700; font-size:14px; color:#fff; flex-shrink:0;}
  .avatar-circle.small{width:64px; height:64px; font-size:22px; margin:0 auto;}
  .zmark{width:18px; height:18px; object-fit:contain;}
  .logo{font-weight:800; font-size:16px;}
  .logo .red{color:var(--red);}
  .tier-badge{font-family:var(--font-mono); font-size:10.5px; padding:5px 10px; border-radius:100px; border:1px solid var(--line);}
  .tier-badge.paid{color:var(--red); border-color:var(--red);}
  .header-right{display:flex; align-items:center; gap:8px;}
  .logout-btn{font-family:var(--font-mono); font-size:10.5px; color:var(--muted); background:transparent; border:1px solid var(--line); border-radius:100px; padding:5px 10px;}
  .settings-btn{background:transparent; color:var(--muted); border:1px solid var(--line); border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center;}

  .settings-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:flex-end; justify-content:center; z-index:110;}
  .settings-overlay.show{display:flex;}
  .settings-panel{width:100%; max-width:480px; background:var(--surface); border:1px solid var(--line); border-radius:20px 20px 0 0; padding:20px; display:flex; flex-direction:column; gap:18px;}
  .settings-title{font-size:17px; font-weight:700;}
  .settings-row{display:flex; flex-direction:column; gap:8px;}
  .settings-row label{font-family:var(--font-mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em;}
  .settings-row select{background:#000; color:var(--text); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px;}
  .settings-toggle-row{display:flex; align-items:center; justify-content:space-between;}
  .settings-toggle-row .settings-desc{font-size:12px; color:var(--muted); margin-top:2px;}
  .switch{position:relative; width:44px; height:26px; flex-shrink:0;}
  .switch input{opacity:0; width:0; height:0;}
  .switch-track{position:absolute; inset:0; background:#3a3a3a; border-radius:100px; transition:0.2s; cursor:pointer;}
  .switch-track:before{content:""; position:absolute; width:20px; height:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:0.2s;}
  .switch input:checked + .switch-track{background:var(--red);}
  .switch input:checked + .switch-track:before{transform:translateX(18px);}
  .settings-close-btn{margin-top:4px; background:var(--red); color:#fff; border:none; border-radius:12px; padding:12px; font-weight:600; font-size:14px;}

  .code-bar{padding:10px 16px; border-bottom:1px solid var(--line); display:none; gap:8px;}
  .code-bar.show{display:flex;}
  .code-bar input{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:9px 12px; font-size:12.5px; color:var(--text);}
  .code-bar button{background:var(--red); color:#fff; border:none; border-radius:12px; padding:9px 14px; font-size:12.5px;}

  .quota{font-family:var(--font-mono); font-size:11px; color:var(--muted); text-align:center; padding:6px 0; border-bottom:1px solid var(--line);}

  .messages{flex:1; overflow-y:auto; padding:20px 18px; display:flex; flex-direction:column; gap:16px;}
  .msg{max-width:82%; padding:14px 17px; border-radius:20px; font-size:14.5px; line-height:1.5; white-space:pre-wrap; word-break:break-word;}
  .msg.user{align-self:flex-end; background:var(--red); color:#fff; font-weight:500; border-bottom-right-radius:6px;}
  .msg.ai{align-self:flex-start; background:var(--surface); border:1px solid var(--line); border-bottom-left-radius:6px;}
  .msg.ai .label{display:block; font-family:var(--font-mono); font-size:10.5px; color:var(--red); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;}
  .msg.error{align-self:flex-start; background:rgba(227,36,43,0.08); border:1px solid rgba(227,36,43,0.35); color:#ff9a9e; border-bottom-left-radius:6px;}
  .msg.error .label{display:block; font-family:var(--font-mono); font-size:10.5px; color:#ff9a9e; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;}

  .quota.low{color:var(--red); font-weight:600;}

  .composer{border-top:1px solid var(--line); padding:14px 16px 22px; display:flex; gap:10px; align-items:flex-end;}
  .composer textarea{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:14px 16px; font-size:14.5px; color:var(--text); font-family:var(--font-body); resize:none; max-height:120px;}
  .composer textarea:focus{outline:none; border-color:var(--red);}
  .send-btn{background:var(--red); color:#fff; border:none; border-radius:50%; width:46px; height:46px; font-size:18px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .send-btn:disabled{opacity:0.5;}
  .mic-btn{background:var(--surface); color:var(--muted); border:1px solid var(--line); border-radius:50%; width:46px; height:46px; font-size:17px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .mic-btn.recording{background:var(--red); color:#fff; border-color:var(--red); animation:pulse 1.2s infinite;}
  @keyframes pulse{0%{opacity:1;} 50%{opacity:0.55;} 100%{opacity:1;}}

  .live-btn{background:var(--red); color:#fff; border:none; border-radius:50%; width:46px; height:46px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .img-btn{background:var(--surface); color:var(--muted); border:1px solid var(--line); border-radius:50%; width:46px; height:46px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .img-btn:disabled{opacity:0.5;}
  .msg.ai img{max-width:100%; border-radius:14px; margin-top:4px; display:block;}

  .live-overlay{position:fixed; inset:0; background:#000; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:100;}
  .live-overlay.show{display:flex;}
  .live-orb{width:140px; height:140px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #ff6a6f, var(--red) 70%); box-shadow:0 0 60px rgba(227,36,43,0.5);}
  .live-orb.listening{animation:orbPulse 1.4s ease-in-out infinite;}
  .live-orb.speaking{animation:orbSpeak 0.5s ease-in-out infinite;}
  @keyframes orbPulse{0%,100%{transform:scale(1);} 50%{transform:scale(1.12);}}
  @keyframes orbSpeak{0%,100%{transform:scale(1);} 50%{transform:scale(0.9);}}
  .live-status{font-family:var(--font-mono); font-size:13px; color:var(--muted); letter-spacing:0.05em;}
  .live-transcript{max-width:80%; text-align:center; font-size:15px; color:var(--text); min-height:24px;}
  .live-close{position:absolute; top:24px; right:24px; background:var(--surface); border:1px solid var(--line); color:var(--text); border-radius:50%; width:40px; height:40px; font-size:16px; display:flex; align-items:center; justify-content:center;}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ---- Supabase client ----
  const sb = supabase.createClient(
    'https://pjrkzujhrngllagxawxv.supabase.co',
    'sb_publishable_qTeyK93yFVIfzGiycOKP4w_EOKcJAyp'
  );
  let userEmail = '';
  let userId = '';
  let accessToken = '';
</script>

<header>
  <button class="brand" id="brandBtn">
    <img src="assets/logo2-96.png" class="zmark" alt="ZO AI">
    <div class="logo">ZO <span class="red">AI</span></div>
  </button>
  <div class="header-right">
    <div class="tier-badge" id="tierBadge">Free · GPT</div>
    <button class="settings-btn" id="settingsBtn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="logout-btn" id="logoutBtn">Log out</button>

</header>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="settings-title">Settings</div>

    <div class="settings-row">
      <label>Voice language</label>
      <select id="voiceLangSelect">
        <option value="id-ID">Bahasa Indonesia</option>

        <option value="hi-IN">हिन्दी</option>
      </select>
    </div>

    <div class="settings-row settings-toggle-row">
      <div>
        <div>Web search</div>
        <div class="settings-desc">Let the AI search the web for real-time info</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="webSearchToggle" checked>
        <span class="switch-track"></span>
      </label>

    <button class="settings-close-btn" id="settingsCloseBtn">Done</button>

</div>

<div class="settings-overlay" id="profileOverlay">
  <div class="settings-panel">

    <div class="avatar-circle small" id="profileAvatar"></div>

    <div class="settings-row">
      <label id="profileNameLabel">Name</label>
      <input type="text" id="profileNameInput" style="background:#000; color:var(--text); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px;">
    </div>

    <div class="settings-row">
      <label id="profileEmailLabel">Email</label>
      <div style="font-size:14px; color:var(--muted); padding:10px 0;" id="profileEmailValue"></div>
    </div>

    <button class="settings-close-btn" id="profileSaveBtn">Save profile</button>
  </div>
</div>

<div class="live-overlay" id="liveOverlay">
  <button class="live-close" id="liveCloseBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  <div class="live-orb" id="liveOrb"></div>
  <div class="live-status" id="liveStatus">Listening...</div>
  <div class="live-transcript" id="liveTranscript"></div>
</div>

<div class="quota" id="quotaBar">Checking your plan...</div>

<div class="messages" id="messages">
  <div class="msg ai"><span class="label">ZO AI</span>Hey! I can help with writing, research, planning — anything, really. Ask me something.</div>
</div>

<div class="composer">
  <textarea id="input" rows="1" placeholder="Message ZO AI..."></textarea>
  <button class="mic-btn" id="micBtn" title="Voice input">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
  <button class="img-btn" id="imgBtn" title="Generate image">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
  </button>
  <button class="live-btn" id="liveBtn" title="Live voice mode">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="10" x2="4" y2="14"/><line x1="8" y1="6" x2="8" y2="18"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="16" y1="6" x2="16" y2="18"/><line x1="20" y1="10" x2="20" y2="14"/></svg>
  </button>
  <button class="send-btn" id="sendBtn"><svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
</div>

<script>
  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const tierBadge = document.getElementById('tierBadge');
  const quotaBar = document.getElementById('quotaBar');
  const logoutBtn = document.getElementById('logoutBtn');
  const micBtn = document.getElementById('micBtn');
  const imgBtn = document.getElementById('imgBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsOverlay = document.getElementById('settingsOverlay');
  const settingsCloseBtn = document.getElementById('settingsCloseBtn');
  const voiceLangSelect = document.getElementById('voiceLangSelect');
  const webSearchToggle = document.getElementById('webSearchToggle');
  const brandBtn = document.getElementById('brandBtn');
  const profileOverlay = document.getElementById('profileOverlay');
  const profileAvatar = document.getElementById('profileAvatar');
  const profileNameInput = document.getElementById('profileNameInput');
  const profileEmailValue = document.getElementById('profileEmailValue');
  const profileSaveBtn = document.getElementById('profileSaveBtn');
  const profileTitle = document.getElementById('profileTitle');
  const profileNameLabel = document.getElementById('profileNameLabel');
  const profileEmailLabel = document.getElementById('profileEmailLabel');
  const liveBtn = document.getElementById('liveBtn');
  const liveOverlay = document.getElementById('liveOverlay');
  const liveOrb = document.getElementById('liveOrb');
  const liveStatus = document.getElementById('liveStatus');
  const liveTranscript = document.getElementById('liveTranscript');
  const liveCloseBtn = document.getElementById('liveCloseBtn');

  logoutBtn.addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });

  let history = [];

  function updateBadge(tier){
    if (tier === 'paid') {
      tierBadge.textContent = t('proClaude');
      tierBadge.classList.add('paid');
    } else {
      tierBadge.textContent = t('freeGpt');
      tierBadge.classList.remove('paid');
    }
  }

  function addMessage(text, who){
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    if (who === 'ai' || who === 'error') {
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = who === 'error' ? 'Notice' : 'ZO AI';
      div.appendChild(label);
      div.appendChild(document.createTextNode(text));
    } else {
      div.textContent = text;
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  // Tampilan error yang ramah, gak nampilin pesan mentah dari provider AI
  function friendlyErrorFor(status, data){
    if (status === 429 && typeof data.limit === 'number') {
      return data.tier === 'paid' ? t('dailyLimitPaid')(data.limit) : t('dailyLimitFree')(data.limit);
    }
    if (status === 503) return t('aiBusy');
    if (status >= 500) return t('serverError');
    return t('genericError');
  }

  function updateQuotaBar(tier, remaining){
    if (typeof remaining !== 'number') return;
    const label = tier === 'paid' ? t('questionsLeftPro') : t('questionsLeftFree');
    quotaBar.textContent = remaining + ' ' + label;
    quotaBar.classList.toggle('low', remaining <= 1);
  }

  // Cek sisa kuota begitu halaman dibuka, tanpa makan jatah (endpoint read-only)
  async function checkStatus(){
    try {
      const res = await fetch('/api/status', {
        headers: accessToken ? { 'Authorization': 'Bearer ' + accessToken } : {}
      });
      const data = await res.json();
      updateBadge(data.tier);
      updateQuotaBar(data.tier, data.remaining);
    } catch (e) {
      quotaBar.textContent = '';
    }
  }

  // Muat riwayat chat sebelumnya dari Supabase (RLS: cuma punya user sendiri)
  async function loadHistory(){
    try {
      const { data, error } = await sb
        .from('chat_messages')
        .select('role, content')
        .order('created_at', { ascending: true })
        .limit(100);

      if (error || !data || data.length === 0) return;

      messages.innerHTML = '';
      data.forEach(m => {
        addMessage(m.content, m.role === 'user' ? 'user' : 'ai');
        history.push({ role: m.role, content: m.content });
      });
    } catch (e) {
      console.error('Gagal memuat riwayat chat:', e);
    }
  }

  // Simpan 1 pesan ke Supabase (dipanggil buat pesan user & balasan AI)
  async function saveMessage(role, content){
    try {
      await sb.from('chat_messages').insert({ user_id: userId, role, content });
    } catch (e) {
      console.error('Gagal menyimpan pesan:', e);
    }
  }

  // Fungsi inti: kirim history ke /api/chat, dipakai bareng oleh mode teks & voice
  async function sendToAI(){
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(accessToken ? { 'Authorization': 'Bearer ' + accessToken } : {})
        },
        body: JSON.stringify({ messages: history, webSearchEnabled })
      });
      const data = await res.json();

      if (data.error) {
        return { ok: false, message: friendlyErrorFor(res.status, data) };
      }
      history.push({ role: 'assistant', content: data.reply });
      saveMessage('assistant', data.reply);
      updateBadge(data.tier);
      updateQuotaBar(data.tier, data.remaining);
      return { ok: true, reply: data.reply };
    } catch (err) {
      return { ok: false, message: t('networkError') };
    }
  }

  async function send(){
    const val = input.value.trim();
    if(!val) return;
    addMessage(val, 'user');
    history.push({ role: 'user', content: val });
    saveMessage('user', val);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const loadingDiv = addMessage(t('thinking'), 'ai');
    const result = await sendToAI();
    loadingDiv.remove();

    if (!result.ok) {
      addMessage(result.message, 'error');
    } else {
      addMessage(result.reply, 'ai');
    }

    sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', send);

  // Tampilin bubble AI yang isinya gambar (bukan teks)
  function addImageMessage(base64){
    const div = document.createElement('div');
    div.className = 'msg ai';
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = 'ZO AI';
    div.appendChild(label);
    const img = document.createElement('img');
    img.src = 'data:image/png;base64,' + base64;
    img.alt = 'Generated image';
    div.appendChild(img);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  async function generateImage(){
    const promptText = input.value.trim();
    if (!promptText) {
      addMessage(t('typeFirst'), 'error');
      return;
    }

    addMessage(promptText, 'user');
    saveMessage('user', promptText);
    input.value = '';
    input.style.height = 'auto';
    imgBtn.disabled = true;

    const loadingDiv = addMessage(t('generatingImage'), 'ai');

    try {
      const res = await fetch('/api/image', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(accessToken ? { 'Authorization': 'Bearer ' + accessToken } : {})
        },
        body: JSON.stringify({ prompt: promptText })
      });
      const data = await res.json();
      loadingDiv.remove();

      if (data.error) {
        addMessage(friendlyErrorFor(res.status, data), 'error');
      } else {
        addImageMessage(data.image);
        if (typeof data.remaining === 'number') {
          quotaBar.textContent = data.remaining + ' ' + t('imagesLeft');
        }
      }
    } catch (err) {
      loadingDiv.remove();
      addMessage(t('networkError'), 'error');
    }

    imgBtn.disabled = false;
  }

  imgBtn.addEventListener('click', generateImage);
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // ---- Terjemahan UI (dipasangin ke bahasa yang dipilih di Settings) ----
  const translations = {
    en: {
      logout: 'Log out', settings: 'Settings', voiceLanguage: 'Voice language',
      webSearch: 'Web search', webSearchDesc: 'Let the AI search the web for real-time info',
      done: 'Done', listening: 'Listening...', thinking: 'Thinking...', speaking: 'Speaking...',
      welcome: 'Hey! I can help with writing, research, planning — anything, really. Ask me something.',
      placeholder: 'Message ZO AI...', freeGpt: 'Free · GPT', proClaude: 'Pro · Claude',
      typeFirst: 'Type a description first, then tap this button to generate an image.',
      generatingImage: 'Generating image...', imagesLeft: 'images left today',
      questionsLeftFree: 'free questions left today', questionsLeftPro: 'Pro questions left today',
      dailyLimitPaid: (limit) => `You've reached your ${limit} question limit for today.`,
      dailyLimitFree: (limit) => `You've reached your free limit of ${limit} questions today. Upgrade to Pro for a bigger quota.`,
      aiBusy: 'The AI service is busy right now. Please try again shortly.',
      serverError: 'Something went wrong on our end. Please try again in a moment.',
      genericError: 'Something went wrong. Please try again.',
      networkError: 'Could not reach the server. Check your connection and try again.',
      profile: 'Profile', name: 'Name', email: 'Email', saveProfile: 'Save profile',
    },
    id: {
      logout: 'Keluar', settings: 'Pengaturan', voiceLanguage: 'Bahasa suara',
      webSearch: 'Pencarian web', webSearchDesc: 'Izinkan AI mencari di internet untuk info terkini',
      done: 'Selesai', listening: 'Mendengarkan...', thinking: 'Berpikir...', speaking: 'Berbicara...',
      welcome: 'Hai! Saya bisa bantu nulis, riset, rencana — apa aja. Tanya sesuatu ya.',
      placeholder: 'Pesan ke ZO AI...', freeGpt: 'Gratis · GPT', proClaude: 'Pro · Claude',
      typeFirst: 'Ketik deskripsi dulu, baru tap tombol ini untuk membuat gambar.',
      generatingImage: 'Membuat gambar...', imagesLeft: 'gambar tersisa hari ini',
      questionsLeftFree: 'pertanyaan gratis tersisa hari ini', questionsLeftPro: 'pertanyaan Pro tersisa hari ini',
      dailyLimitPaid: (limit) => `Kamu sudah mencapai batas ${limit} pertanyaan hari ini.`,
      dailyLimitFree: (limit) => `Kamu sudah mencapai batas gratis ${limit} pertanyaan hari ini. Upgrade ke Pro untuk kuota lebih besar.`,
      aiBusy: 'Layanan AI sedang sibuk. Coba lagi sebentar lagi.',
      serverError: 'Ada gangguan di server kami. Coba lagi dalam beberapa saat.',
      genericError: 'Terjadi kesalahan. Coba lagi ya.',
      networkError: 'Tidak bisa terhubung ke server. Cek koneksi internet kamu, lalu coba lagi.',
      profile: 'Profil', name: 'Nama', email: 'Email', saveProfile: 'Simpan profil',
    },
  };

  function currentLang(){
    return voiceLang.startsWith('id') ? 'id' : 'en';
  }

  function t(key){
    return translations[currentLang()][key];
  }

  function applyUILanguage(){
    logoutBtn.textContent = t('logout');
    document.querySelector('.settings-title').textContent = t('settings');
    document.querySelector('.settings-row label').textContent = t('voiceLanguage');
    const webSearchLabel = document.querySelectorAll('.settings-toggle-row > div > div');
    if (webSearchLabel[0]) webSearchLabel[0].textContent = t('webSearch');
    if (webSearchLabel[1]) webSearchLabel[1].textContent = t('webSearchDesc');
    settingsCloseBtn.textContent = t('done');
    profileTitle.textContent = t('profile');
    profileNameLabel.textContent = t('name');
    profileEmailLabel.textContent = t('email');
    profileSaveBtn.textContent = t('saveProfile');
    liveStatus.textContent = t('listening');
    input.placeholder = t('placeholder');
    tierBadge.textContent = tierBadge.classList.contains('paid') ? t('proClaude') : t('freeGpt');

    // Update welcome message kalau belum ada riwayat chat (masih pesan default)
    const firstMsg = messages.querySelector('.msg.ai');
    if (firstMsg && messages.children.length === 1) {
      const label = firstMsg.querySelector('.label');
      firstMsg.textContent = '';
      if (label) firstMsg.appendChild(label);
      else {
        const l = document.createElement('span'); l.className = 'label'; l.textContent = 'ZO AI';
        firstMsg.appendChild(l);
      }
      firstMsg.appendChild(document.createTextNode(t('welcome')));
    }
  }

  // ---- Settings: bahasa suara & toggle web search, disimpan di localStorage ----
  let voiceLang = localStorage.getItem('zo_voice_lang') || 'en-US';
  let webSearchEnabled = localStorage.getItem('zo_web_search') !== 'off';
  voiceLangSelect.value = voiceLang;
  webSearchToggle.checked = webSearchEnabled;
  applyUILanguage();

  settingsBtn.addEventListener('click', () => settingsOverlay.classList.add('show'));
  settingsCloseBtn.addEventListener('click', () => {
    voiceLang = voiceLangSelect.value;
    webSearchEnabled = webSearchToggle.checked;
    localStorage.setItem('zo_voice_lang', voiceLang);
    localStorage.setItem('zo_web_search', webSearchEnabled ? 'on' : 'off');
    applyUILanguage();
    settingsOverlay.classList.remove('show');
  });
  settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) settingsCloseBtn.click();
  });

  // ---- Profile: avatar + nama tampilan, disimpen di tabel Supabase 'profiles' ----
  let displayName = '';

  function avatarColorFor(str){
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 55%, 42%)`;
  }

  function initialsFor(name, email){
    const source = (name && name.trim()) || email || '?';
    const parts = source.trim().split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return source.slice(0, 2).toUpperCase();
  }

  function renderAvatar(){
    const initials = initialsFor(displayName, userEmail);
    const color = avatarColorFor(displayName || userEmail || 'ZO');
    profileAvatar.textContent = initials;
    profileAvatar.style.background = color;
  }

  async function loadProfile(){
    try {
      const { data } = await sb.from('profiles').select('display_name').eq('user_id', userId).single();
      if (data && data.display_name) displayName = data.display_name;
    } catch (e) {
      // belum ada profil tersimpan — gapapa, pakai default
    }
    renderAvatar();
  }

  async function saveProfile(){
    const newName = profileNameInput.value.trim();
    displayName = newName;
    try {
      await sb.from('profiles').upsert({ user_id: userId, display_name: newName, updated_at: new Date().toISOString() });
    } catch (e) {
      console.error('Gagal menyimpan profil:', e);
    }
    renderAvatar();
    profileOverlay.classList.remove('show');
  }

  brandBtn.addEventListener('click', () => {
    profileNameInput.value = displayName;
    profileEmailValue.textContent = userEmail;
    profileOverlay.classList.add('show');
  });
  profileSaveBtn.addEventListener('click', saveProfile);
  profileOverlay.addEventListener('click', (e) => {
    if (e.target === profileOverlay) profileOverlay.classList.remove('show');
  });

  // ---- Voice input (Web Speech API — bawaan Chrome, gratis, gak lewat API AI) ----
  const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognitionAPI) {
    const recognition = new SpeechRecognitionAPI();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = voiceLang;

    let isRecording = false;

    recognition.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
    };

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      input.value = (input.value ? input.value + ' ' : '') + transcript;
      input.dispatchEvent(new Event('input'));
    };

    recognition.onerror = (event) => {
      console.error('Speech recognition error:', event.error);
    };

    recognition.onend = () => {
      isRecording = false;
      micBtn.classList.remove('recording');
    };

    micBtn.addEventListener('click', () => {
      if (isRecording) {
        recognition.stop();
      } else {
        recognition.lang = voiceLang;
        recognition.start();
      }
    });
  } else {
    // Browser gak support (misal Firefox/Safari lama) — sembunyiin tombolnya
    micBtn.style.display = 'none';
  }

  // ---- Live voice mode: dengerin terus, auto-kirim, jawaban dibacain ----
  if (SpeechRecognitionAPI && 'speechSynthesis' in window) {
    const liveRecognition = new SpeechRecognitionAPI();
    liveRecognition.continuous = false;
    liveRecognition.interimResults = false;
    liveRecognition.lang = voiceLang;

    let liveActive = false;

    function setLiveState(state, text){
      liveOrb.classList.remove('listening', 'speaking');
      if (state) liveOrb.classList.add(state);
      liveStatus.textContent = text;
    }

    function speak(text){
      return new Promise((resolve) => {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = voiceLang;
        utter.onend = resolve;
        utter.onerror = resolve;
        window.speechSynthesis.speak(utter);
      });
    }

    async function startListening(){
      if (!liveActive) return;
      liveRecognition.lang = voiceLang;
      liveTranscript.textContent = '';
      setLiveState('listening', t('listening'));
      try {
        liveRecognition.start();
      } catch (e) {
        // recognition mungkin masih jalan dari sebelumnya, abaikan
      }
    }

    liveRecognition.onresult = async (event) => {
      const transcript = event.results[0][0].transcript;
      liveTranscript.textContent = transcript;
      setLiveState(null, t('thinking'));

      addMessage(transcript, 'user');
      history.push({ role: 'user', content: transcript });
      saveMessage('user', transcript);

      const result = await sendToAI();
      if (!liveActive) return; // user udah nutup live mode pas nunggu jawaban

      if (!result.ok) {
        addMessage(result.message, 'error');
        setLiveState('speaking', t('speaking'));
        liveTranscript.textContent = result.message;
        await speak(result.message);
      } else {
        addMessage(result.reply, 'ai');
        setLiveState('speaking', t('speaking'));
        liveTranscript.textContent = result.reply;
        await speak(result.reply);
      }

      if (liveActive) startListening();
    };

    liveRecognition.onerror = (event) => {
      console.error('Live recognition error:', event.error);
      if (liveActive && event.error !== 'aborted') {
        setTimeout(startListening, 800);
      }
    };

    liveBtn.addEventListener('click', () => {
      liveActive = true;
      liveOverlay.classList.add('show');
      startListening();
    });

    function stopLiveMode(){
      liveActive = false;
      window.speechSynthesis.cancel();
      try { liveRecognition.stop(); } catch (e) {}
      liveOverlay.classList.remove('show');
    }

    liveCloseBtn.addEventListener('click', stopLiveMode);
  } else {
    liveBtn.style.display = 'none';
  }

  // ---- Init: cek login, lalu muat riwayat + status quota ----
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = 'index.html';
      return;
    }
    userEmail = session.user.email;
    userId = session.user.id;
    accessToken = session.access_token;

    await loadHistory();
    await checkStatus();
    await loadProfile();
  })();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
  }
</script>
</body>
</html>
