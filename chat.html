<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZO AI — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000; --surface:#0d0d0f; --line:rgba(255,255,255,0.09);
    --text:#ffffff; --muted:#96959b; --red:#e3242b;
    --font-body:'Inter', sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:var(--font-body); height:100vh; display:flex; flex-direction:column;}

  header{display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--line); flex-shrink:0;}
  .brand{display:flex; align-items:center; gap:8px;}
  .zmark{width:18px; height:18px;}
  .logo{font-weight:800; font-size:16px;}
  .logo .red{color:var(--red);}
  .status{font-family:var(--font-mono); font-size:11px; color:var(--red); display:flex; align-items:center; gap:6px;}
  .status::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--red); box-shadow:0 0 8px var(--red);}

  .messages{flex:1; overflow-y:auto; padding:24px 18px; display:flex; flex-direction:column; gap:16px;}
  .msg{max-width:82%; padding:14px 17px; border-radius:20px; font-size:14.5px; line-height:1.5;}
  .msg.user{align-self:flex-end; background:var(--red); color:#fff; font-weight:500; border-bottom-right-radius:6px;}
  .msg.ai{align-self:flex-start; background:var(--surface); border:1px solid var(--line); border-bottom-left-radius:6px;}
  .msg.ai .label{font-family:var(--font-mono); font-size:10.5px; color:var(--red); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; display:block; font-weight:600;}

  .composer{border-top:1px solid var(--line); padding:14px 16px 22px; flex-shrink:0; display:flex; gap:10px; align-items:flex-end;}
  .composer textarea{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:14px 17px; color:var(--text); font-family:var(--font-body); font-size:14.5px; resize:none; max-height:120px;}
  .composer textarea:focus{outline:none; border-color:var(--red);}
  .send-btn{background:var(--red); color:#fff; border:none; border-radius:50%; width:46px; height:46px; font-size:18px; flex-shrink:0; font-weight:700;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="zmark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 13 A 35 35 0 1 1 49.9 13" fill="none" stroke="#e3242b" stroke-width="9"/><rect x="44" y="2" width="12" height="20" rx="4" fill="#e3242b"/><path d="M50 38 L68 68 L57 68 L50 54 L43 68 L32 68 Z" fill="#e3242b"/></svg>
    <div class="logo">ZO <span class="red">AI</span></div>
  </div>
  <div class="status">online</div>
</header>

<div class="messages" id="messages">
  <div class="msg ai"><span class="label">ZO AI</span>Hey! I can help with writing, research, planning — anything, really. This is a preview screen, not yet wired to the live Claude API.</div>
  <div class="msg user">Can you help me draft a tweet?</div>
  <div class="msg ai"><span class="label">ZO AI</span>Of course — what's it about, and what tone are you going for?</div>
</div>

<div class="composer">
  <textarea id="input" rows="1" placeholder="Message ZO AI..."></textarea>
  <button class="send-btn" id="sendBtn">↑</button>
</div>

<script>
  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  function addMessage(text, who){
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    div.innerHTML = who === 'ai' ? '<span class="label">ZO AI</span>' + text : text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }
  function send(){
    const val = input.value.trim();
    if(!val) return;
    addMessage(val, 'user');
    input.value = '';
    setTimeout(()=>{ addMessage('This is still a demo reply — connect the <code>/api/chat</code> endpoint to the real Claude API to go live.', 'ai'); }, 500);
  }
  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
</script>
</body>
</html>
